<tspan x="895" dy="12">#      except: continue</tspan>

<!-- JSON Extraction Strategies -->
<rect x="1285" y="430" width="465" height="120" fill="#bbdefb" stroke="#1565c0" stroke-width="1" rx="6"/>
<text x="1517" y="448" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold" font-family="Courier New">JSON Extraction Strategies</text>
<line x1="1295" y1="455" x2="1740" y2="455" stroke="#1565c0" stroke-width="0.5"/>
<text x="1300" y="472" font-size="10" fill="#0d47a1" font-family="Courier New">
<tspan x="1300" dy="0">Strategy 1: raw              → json.loads() direct</tspan>
<tspan x="1300" dy="16">Strategy 2: strip_fences()   → removes ```json ``` fences</tspan>
<tspan x="1300" dy="16">Strategy 3: scan_anywhere()  → finds first balanced { or [</tspan>
<tspan x="1300" dy="16">Each: json.loads() → MCQList.model_validate()</tspan>
<tspan x="1300" dy="16">Max 9 parse attempts per generation (3 × 3)</tspan>
</text>

<!-- SYSTEM PROMPT box -->
<rect x="1285" y="565" width="465" height="145" fill="#bbdefb" stroke="#1565c0" stroke-width="1" rx="6"/>
<text x="1517" y="583" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold" font-family="Courier New">SYSTEM_PROMPT Rules</text>
<line x1="1295" y1="590" x2="1740" y2="590" stroke="#1565c0" stroke-width="0.5"/>
<text x="1300" y="607" font-size="10" fill="#0d47a1" font-family="Courier New">
<tspan x="1300" dy="0">• Return ONLY JSON (no fences, no explanation)</tspan>
<tspan x="1300" dy="14">• Exactly 5 questions, each with 4 options</tspan>
<tspan x="1300" dy="14">• Questions must cover DIFFERENT topics</tspan>
<tspan x="1300" dy="14">• Answer = one option VERBATIM (no synonyms)</tspan>
<tspan x="1300" dy="14">• Moderate difficulty (comprehension, not trivia)</tspan>
<tspan x="1300" dy="14">• If material too short → "limitation" field</tspan>
</text>

<!-- MCQ class -->
<rect x="185" y="780" width="360" height="148" fill="#f8bbd0" stroke="#c62828" stroke-width="1" rx="6"/>
<text x="365" y="800" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold" font-family="Courier New">class MCQ(BaseModel)</text>

<text x="200" y="822" font-size="10" fill="#880e4f" font-family="Courier New">
<tspan x="200" dy="0">question:     str  min_length=5</tspan>
<tspan x="200" dy="16">options:       List[str] exactly 4</tspan>
<tspan x="200" dy="16">answer:       str must match option</tspan>
<tspan x="200" dy="16">explanation:   str min_length=10</tspan>
<tspan x="200" dy="20">model_post_init():</tspan>
<tspan x="200" dy="14">  if answer ∉ options:</tspan>
<tspan x="200" dy="14">    raise ValueError</tspan>
</text>

<!-- MCQList class -->
<rect x="565" y="780" width="360" height="148" fill="#f8bbd0" stroke="#c62828" stroke-width="1" rx="6"/>
<text x="745" y="800" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold" font-family="Courier New">class MCQList(BaseModel)</text>
<line x1="575" y1="806" x2="915" y2="806" stroke="#c62828" stroke-width="0.5"/>
<text x="580" y="822" font-size="10" fill="#880e4f" font-family="Courier New">
<tspan x="580" dy="0">questions: List[MCQ]</tspan>
<tspan x="580" dy="16">             min_length=5</tspan>
<tspan x="580" dy="16">             max_length=5</tspan>
<tspan x="580" dy="24">On validation failure:</tspan>
<tspan x="580" dy="14">  → Caught in retry loop</tspan>
<tspan x="580" dy="14">  → Fresh API call made</tspan>
<tspan x="580" dy="14">  → Up to 3 total attempts</tspan>
</text>

<!-- Validation Rules -->
<rect x="945" y="780" width="800" height="148" fill="#f8bbd0" stroke="#c62828" stroke-width="1" rx="6"/>
<text x="1345" y="800" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold" font-family="Courier New">Why Pydantic? LLM Output Is Untrusted</text>
<line x1="955" y1="806" x2="1735" y2="806" stroke="#c62828" stroke-width="0.5"/>
<text x="960" y="822" font-size="10" fill="#880e4f" font-family="Courier New">
<tspan x="960" dy="0">Claude can return malformed JSON, wrong schema, wrong field names,</tspan>
<tspan x="960" dy="14">extra fields, missing fields, or answer not in options.</tspan>
<tspan x="960" dy="20">Pydantic catches ALL of these → triggers retry → resilient pipeline.</tspan>
<tspan x="960" dy="20">This is a core AI engineering pattern: NEVER trust model output</tspan>
<tspan x="960" dy="14">without schema validation. Never assume the LLM is correct.</tspan>
</text>

<!-- ============================================================

<!-- Retry Flow -->
<rect x="1790" y="340" width="400" height="300" fill="#fff8e1" stroke="#ff8f00" stroke-width="2" rx="10"/>
<text x="1990" y="362" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold" font-family="Arial">Deep Dive: Retry + Parse Flow</text>
<line x1="1800" y1="370" x2="2180" y2="370" stroke="#ff8f00" stroke-width="0.5"/>
<text x="1805" y="385" font-size="10" fill="#e65100" font-family="Courier New">
<tspan x="1805" dy="0">generate_mcqs()</tspan>
<tspan x="1805" dy="12">──────────────────────────</tspan>
<tspan x="1805" dy="12">for attempt in range(3):</tspan>
<tspan x="1805" dy="10">  raw = _call_api(...)</tspan>
<tspan x="1805" dy="14">  for strategy in [</tspan>
<tspan x="1805" dy="10">    raw, strip_fences,</tspan>
<tspan x="1805" dy="10">    scan_anywhere]:</tspan>
<tspan x="1805" dy="12">    try:</tspan>
<tspan x="1805" dy="10">      json.loads(candidate)</tspan>
<tspan x="1805" dy="10">      MCQList.validate(data)</tspan>
<tspan x="1805" dy="10">      return questions ← EXIT</tspan>
<tspan x="1805" dy="10">    except:</tspan>
<tspan x="1805" dy="10">      continue</tspan>
<tspan x="1805" dy="12">  if attempt == 2:</tspan>
<tspan x="1805" dy="10">    raise ValueError</tspan>
<tspan x="1805" dy="16">──────────────────────────</tspan>

<tspan x="1805" dy="12">0.8  →  RECOMMENDED: variety + quality ✓</tspan>

<!-- Deduplication -->
<rect x="1790" y="880" width="400" height="220" fill="#fce4ec" stroke="#c62828" stroke-width="2" rx="10"/>
<text x="1990" y="902" text-anchor="middle" font-size="13" fill="#c62828" font-weight="bold" font-family="Arial">Deep Dive: Deduplication</text>
<line x1="1800" y1="910" x2="2180" y2="910" stroke="#c62828" stroke-width="0.5"/>
<text x="1805" y="925" font-size="10" fill="#c62828" font-family="Courier New">
<tspan x="1805" dy="0">How repetition is prevented</tspan>
<tspan x="1805" dy="12">────────────────────────────────</tspan>
<tspan x="1805" dy="12">Click 1: mcqs = []</tspan>
<tspan x="1805" dy="10">  → API receives no exclusion list</tspan>
<tspan x="1805" dy="10">  → Generates Q1-Q5</tspan>
<tspan x="1805" dy="14">Click 2: mcqs = [Q1-Q5]</tspan>
<tspan x="1805" dy="10">  → Passed as exclude_questions</tspan>
<tspan x="1805" dy="10">  → Prompt appends "DO NOT REPEAT: Q1..Q5"</tspan>
<tspan x="1805" dy="10">  → Model forced to generate Q6-Q10</tspan>
<tspan x="1805" dy="14">Click N: same pattern repeats</tspan>
<tspan x="1805" dy="10">  → All previous questions excluded</tspan>
<tspan x="1805" dy="10">  → Exhausts topics naturally when done</tspan>
</text>

<tspan x="1805" dy="10">Model change      → clear mcqs</tspan>

<tspan x="1805" dy="10">Generate click    → replace mcqs (not append!)</tspan>
<tspan x="1805" dy="14">exclude_questions carries history forward</tspan>
</text>
